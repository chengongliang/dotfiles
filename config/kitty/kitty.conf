# General
background_opacity 0.5
font_size 12.0
confirm_os_window_close 0
enabled_layouts splits,*

# Keybindings
map alt+t new_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+w close_tab

# Vim-style split management
map alt+enter combine : goto_layout splits : launch --cwd=current --location=vsplit
map alt+shift+enter combine : goto_layout splits : launch --cwd=current --location=hsplit
map alt+q close_window

# Font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Nord Color Scheme
foreground            #D8DEE9
background            #2E3440
selection_foreground  #2E3440
selection_background  #D8DEE9
cursor                #D8DEE9
cursor_text_color     #2E3440
url_color             #88C0D0

# Normal colors
color0  #3B4252
color1  #BF616A
color2  #A3BE8C
color3  #EBCB8B
color4  #81A1C1
color5  #B48EAD
color6  #88C0D0
color7  #E5E9F0

# Bright colors
color8  #4C566A
color9  #BF616A
color10 #A3BE8C
color11 #EBCB8B
color12 #81A1C1
color13 #B48EAD
color14 #8FBCBB
color15 #ECEFF4
